<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Lost and Found</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          head: ['Sora', 'sans-serif'],
          body: ['Outfit', 'sans-serif'],
        },
        colors: {
          brand: {
            50: '#f0fffe',
            500: '#0f8b8d',
            600: '#0d7a7b',
            700: '#0b6a6c',
            dark: '#34a9ab'
          },
          accent: {
            red: '#f25f5c',
            gold: '#f4b942',
            green: '#2f9e44'
          },
          stone: {
            paper: '#ffffff',
            paper_alt: '#f2efe6',
            bg: '#f7f5ef',
            line: '#ddd5c4'
          }
        },
        animation: {
          'float-orb': 'floatOrb 13s ease-in-out infinite',
          'rise-in': 'riseIn 0.55s ease both',
          'pulse-dot': 'pulseDot 1.5s ease infinite',
          'spin-slow': 'spin 0.8s linear infinite',
        },
        keyframes: {
          floatOrb: {
            '0%, 100%': { transform: 'translate(0, 0) scale(1)' },
            '50%': { transform: 'translate(0, 22px) scale(1.06)' }
          },
          riseIn: {
            'from': { opacity: '0', transform: 'translateY(16px)' },
            'to': { opacity: '1', transform: 'translateY(0)' }
          },
          pulseDot: {
            '0%, 100%': { transform: 'scale(1)', opacity: '0.9' },
            '50%': { transform: 'scale(0.74)', opacity: '0.5' }
          }
        },
        backdropBlur: {
          xs: '2px',
          sm: '4px',
        }
      }
    }
  }
</script>
<style>
  @keyframes floatOrb {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(0, 22px) scale(1.06); }
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulseDot {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(0.74); opacity: 0.5; }
  }

  body::before,
  body::after {
    content: '';
    position: fixed;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    filter: blur(45px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.42;
    animation: floatOrb 13s ease-in-out infinite;
  }

  body::before {
    background: rgba(242, 95, 92, 0.35);
    top: -120px;
    right: -90px;
  }

  body::after {
    background: rgba(15, 139, 141, 0.32);
    bottom: -130px;
    left: -70px;
    animation-delay: -5.5s;
  }

  .dark body::before {
    background: rgba(100, 116, 139, 0.2);
  }

  .dark body::after {
    background: rgba(30, 41, 59, 0.2);
  }

  /* Smooth color transitions */
  * {
    @apply transition-colors duration-300;
  }

  /* Disable transitions for hover states that need instant feedback */
  .tab, .mode-btn, .filter-chip, button:not(.tab):not(.mode-btn):not(.filter-chip) {
    @apply transition-all duration-200;
  }
</style>
</head>
<body class="min-h-screen font-body text-slate-900 dark:text-slate-100 dark:bg-slate-950">

<!-- Floating background orbs (CSS-based, no need for divs) -->

<div class="relative z-10">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-6">
    <!-- Header -->
    <header class="mb-7 rounded-3xl border border-white/40 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md shadow-sm dark:border-slate-700/60 p-5 sm:p-6">
      <div class="flex items-center justify-between flex-wrap gap-4">
        <!-- Logo -->
        <div class="flex items-center gap-3">
          <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-brand-500 to-cyan-600 dark:from-brand-dark dark:to-cyan-500 text-white font-head text-xl font-black flex items-center justify-center shadow-lg">
            L+F
          </div>
          <div>
            <div class="font-head text-3xl font-black tracking-tight">
              Lost<span class="text-brand-500 dark:text-brand-dark">&</span>Found
            </div>
            <div class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-widest font-semibold">
              El Sewedy University Match Desk
            </div>
          </div>
        </div>

        <!-- Stats & Theme Toggle -->
        <div class="flex items-center gap-3 flex-wrap">
          <!-- Stats -->
          <div class="stat-pill rounded-full px-4 py-2 text-sm bg-white/70 dark:bg-slate-700/70 border border-slate-200 dark:border-slate-600 shadow-sm">
            Lost Reports <strong class="ml-1" id="stat-lost">15</strong>
          </div>
          <div class="stat-pill rounded-full px-4 py-2 text-sm bg-white/70 dark:bg-slate-700/70 border border-slate-200 dark:border-slate-600 shadow-sm">
            Found Reports <strong class="ml-1" id="stat-found">20</strong>
          </div>

          <!-- Theme Toggle Button -->
          <button id="theme-toggle" class="ml-2 p-2.5 rounded-xl bg-white/70 dark:bg-slate-700/70 border border-slate-200 dark:border-slate-600 hover:bg-white dark:hover:bg-slate-600 shadow-sm transition-all duration-200" title="Toggle dark/light mode">
            <span id="theme-icon" class="text-xl">☀️</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Tabs Navigation -->
    <div class="flex gap-2 mb-7 inline-flex bg-white/80 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 rounded-2xl p-2 shadow-sm">
      <button class="tab active px-5 py-2.5 font-head text-sm font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 rounded-xl transition-all duration-200 cursor-pointer hover:text-slate-900 dark:hover:text-white hover:bg-slate-50 dark:hover:bg-slate-700/50" onclick="switchTab('match')">Find Match</button>
      <button class="tab px-5 py-2.5 font-head text-sm font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 rounded-xl transition-all duration-200 cursor-pointer hover:text-slate-900 dark:hover:text-white hover:bg-slate-50 dark:hover:bg-slate-700/50" onclick="switchTab('submit')">Submit Report</button>
      <button class="tab px-5 py-2.5 font-head text-sm font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 rounded-xl transition-all duration-200 cursor-pointer hover:text-slate-900 dark:hover:text-white hover:bg-slate-50 dark:hover:bg-slate-700/50" onclick="switchTab('browse')">Browse Records</button>
    </div>

    <!-- Tab Content: Find Match -->
    <div id="tab-match" class="grid grid-cols-1 lg:grid-cols-5 gap-6 slide-fade tab-panel is-active">
      <!-- Left Panel: Search Form -->
      <div class="lg:col-span-2">
        <div class="rounded-3xl border border-slate-200 dark:border-slate-700 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md shadow-sm dark:shadow-none overflow-hidden animation-rise-in">
          <div class="px-5 py-4 sm:px-6 sm:py-5 border-b border-slate-200 dark:border-slate-700 font-head text-sm font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
            Search For Your Item
          </div>
          <div class="p-5 sm:p-6">
            <!-- Mode Toggle -->
            <div class="flex border border-slate-300 dark:border-slate-600 rounded-2xl overflow-hidden mb-5 bg-amber-50/50 dark:bg-slate-700/30">
              <button class="mode-btn flex-1 py-3 px-3 text-xs font-head font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 bg-transparent transition-all duration-200 cursor-pointer active:bg-accent-red active:text-white dark:active:bg-accent-red" id="mode-lost" onclick="setMode('lost')">I Lost Something</button>
              <button class="mode-btn flex-1 py-3 px-3 text-xs font-head font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 bg-transparent transition-all duration-200 cursor-pointer active:bg-brand-500 active:text-white dark:active:bg-brand-dark" id="mode-found" onclick="setMode('found')">I Found Something</button>
            </div>

            <!-- Status Chip -->
            <div class="inline-flex items-center gap-2 px-3 py-2 rounded-full border border-brand-500/30 dark:border-brand-dark/30 bg-brand-50/20 dark:bg-brand-500/10 text-brand-700 dark:text-brand-300 text-xs font-bold uppercase tracking-wider mb-5">
              <span class="w-2 h-2 rounded-full bg-brand-500 dark:bg-brand-dark animate-pulse"></span>
              Smart Matching Engine
            </div>

            <!-- Form Fields -->
            <div class="space-y-4">
              <div>
                <label class="block text-xs text-slate-600 dark:text-slate-400 font-bold uppercase tracking-wider mb-2">Describe The Item</label>
                <textarea id="m-desc" placeholder="Example: black Sony wireless headphones with noise cancelling, left in library." class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-amber-50 dark:bg-slate-900 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:border-brand-500 dark:focus:border-brand-dark focus:ring-4 focus:ring-brand-100 dark:focus:ring-brand-900/30 transition-all duration-200 outline-none min-h-24"></textarea>
              </div>

              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-xs text-slate-600 dark:text-slate-400 font-bold uppercase tracking-wider mb-2">Category</label>
                  <select id="m-cat" class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-amber-50 dark:bg-slate-900 text-slate-900 dark:text-white focus:border-brand-500 dark:focus:border-brand-dark focus:ring-4 focus:ring-brand-100 dark:focus:ring-brand-900/30 transition-all duration-200 outline-none">
                    <option value="">Auto Detect</option>
                    <option>ID Card</option>
                    <option>Charger</option>
                    <option>Bottle</option>
                    <option>Notebook</option>
                    <option>Headphones</option>
                    <option>Keys</option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs text-slate-600 dark:text-slate-400 font-bold uppercase tracking-wider mb-2">Color</label>
                  <input id="m-color" type="text" placeholder="Example: black" class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-amber-50 dark:bg-slate-900 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:border-brand-500 dark:focus:border-brand-dark focus:ring-4 focus:ring-brand-100 dark:focus:ring-brand-900/30 transition-all duration-200 outline-none">
                </div>
              </div>

              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-xs text-slate-600 dark:text-slate-400 font-bold uppercase tracking-wider mb-2">Location</label>
                  <select id="m-loc" class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-amber-50 dark:bg-slate-900 text-slate-900 dark:text-white focus:border-brand-500 dark:focus:border-brand-dark focus:ring-4 focus:ring-brand-100 dark:focus:ring-brand-900/30 transition-all duration-200 outline-none">
                    <option value="">Any Location</option>
                    <option>Library</option>
                    <option>Cafeteria</option>
                    <option>Building A</option>
                    <option>Building B</option>
                    <option>Sports Hall</option>
                    <option>Parking Lot</option>
                    <option>Main Gate</option>
                    <option>Lab 3</option>
                    <option>Lecture Hall 1</option>
                    <option>Lecture Hall 2</option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs text-slate-600 dark:text-slate-400 font-bold uppercase tracking-wider mb-2">Date</label>
                  <input id="m-date" type="date" class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-amber-50 dark:bg-slate-900 text-slate-900 dark:text-white focus:border-brand-500 dark:focus:border-brand-dark focus:ring-4 focus:ring-brand-100 dark:focus:ring-brand-900/30 transition-all duration-200 outline-none">
                </div>
              </div>

              <button class="w-full py-3 px-4 rounded-xl bg-gradient-to-br from-brand-500 to-cyan-600 dark:from-brand-dark dark:to-cyan-500 text-white font-head font-bold uppercase tracking-wider hover:shadow-lg dark:hover:shadow-brand-900/50 transition-all duration-200 cursor-pointer hover:-translate-y-0.5" onclick="runMatch()">Find Matches</button>
            </div>
          </div>
        </div>

        <!-- Category Prediction Panel -->
        <div id="cat-prediction" class="hidden mt-3 rounded-3xl border border-slate-200 dark:border-slate-700 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md shadow-sm p-5 animation-rise-in">
          <div class="text-xs text-slate-600 dark:text-slate-400 font-bold uppercase tracking-wider mb-3">Auto Category Detection</div>
          <div class="flex items-center justify-between gap-3 mb-3">
            <span id="pred-label" class="font-head font-bold text-lg text-slate-900 dark:text-white"></span>
            <span id="pred-conf" class="text-sm text-brand-600 dark:text-brand-400 font-bold"></span>
          </div>
          <div class="w-full h-2 rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden">
            <div class="h-full rounded-full bg-gradient-to-r from-accent-gold to-brand-500 dark:from-amber-400 dark:to-brand-400 transition-all duration-500" id="pred-bar" style="width:0%"></div>
          </div>
        </div>
      </div>

      <!-- Right Panel: Results -->
      <div id="results-panel" class="lg:col-span-3 slide-fade">
        <div class="rounded-3xl border border-dashed border-slate-300 dark:border-slate-600 bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm min-h-72 flex flex-col items-center justify-center text-center px-6 py-12">
          <div class="w-16 h-16 rounded-full bg-gradient-to-br from-brand-500/20 dark:from-brand-500/10 to-accent-red/20 dark:to-accent-red/10 border border-brand-500/30 dark:border-slate-700 flex items-center justify-center font-head text-sm font-bold uppercase text-slate-600 dark:text-slate-400 mb-4">
            Idle
          </div>
          <div class="font-head font-bold text-2xl text-slate-900 dark:text-white mb-3">Ready To Search</div>
          <div class="text-slate-600 dark:text-slate-400 max-w-sm">Describe your item and run a search. Results are ranked by match confidence.</div>
        </div>
      </div>
    </div>

    <!-- Tab Content: Submit Report -->
    <div id="tab-submit" class="hidden max-w-2xl slide-fade tab-panel">
      <div class="rounded-3xl border border-slate-200 dark:border-slate-700 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md shadow-sm dark:shadow-none overflow-hidden">
        <div class="px-5 py-4 sm:px-6 sm:py-5 border-b border-slate-200 dark:border-slate-700 font-head text-sm font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
          Submit A Report
        </div>
        <div class="p-5 sm:p-6 space-y-4">
          <!-- Mode Toggle -->
          <div class="flex border border-slate-300 dark:border-slate-600 rounded-2xl overflow-hidden bg-amber-50/50 dark:bg-slate-700/30">
            <button class="mode-btn flex-1 py-3 px-3 text-xs font-head font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 bg-transparent transition-all duration-200 cursor-pointer active:bg-accent-red active:text-white dark:active:bg-accent-red" id="smode-lost" onclick="setSMode('lost')">I Lost Something</button>
            <button class="mode-btn flex-1 py-3 px-3 text-xs font-head font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 bg-transparent transition-all duration-200 cursor-pointer active:bg-brand-500 active:text-white dark:active:bg-brand-dark" id="smode-found" onclick="setSMode('found')">I Found Something</button>
          </div>

          <!-- Form Fields -->
          <div>
            <label class="block text-xs text-slate-600 dark:text-slate-400 font-bold uppercase tracking-wider mb-2">Item Description *</label>
            <textarea id="s-desc" placeholder="Add details like brand, color, marks, and where it was seen." class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-amber-50 dark:bg-slate-900 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:border-brand-500 dark:focus:border-brand-dark focus:ring-4 focus:ring-brand-100 dark:focus:ring-brand-900/30 transition-all duration-200 outline-none min-h-24"></textarea>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-slate-600 dark:text-slate-400 font-bold uppercase tracking-wider mb-2">Category</label>
              <select id="s-cat" class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-amber-50 dark:bg-slate-900 text-slate-900 dark:text-white focus:border-brand-500 dark:focus:border-brand-dark focus:ring-4 focus:ring-brand-100 dark:focus:ring-brand-900/30 transition-all duration-200 outline-none">
                <option value="">Auto Detect</option>
                <option>ID Card</option>
                <option>Charger</option>
                <option>Bottle</option>
                <option>Notebook</option>
                <option>Headphones</option>
                <option>Keys</option>
              </select>
            </div>
            <div>
              <label class="block text-xs text-slate-600 dark:text-slate-400 font-bold uppercase tracking-wider mb-2">Color</label>
              <input id="s-color" type="text" placeholder="Example: blue, black" class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-amber-50 dark:bg-slate-900 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:border-brand-500 dark:focus:border-brand-dark focus:ring-4 focus:ring-brand-100 dark:focus:ring-brand-900/30 transition-all duration-200 outline-none">
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-slate-600 dark:text-slate-400 font-bold uppercase tracking-wider mb-2">Location</label>
              <select id="s-loc" class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-amber-50 dark:bg-slate-900 text-slate-900 dark:text-white focus:border-brand-500 dark:focus:border-brand-dark focus:ring-4 focus:ring-brand-100 dark:focus:ring-brand-900/30 transition-all duration-200 outline-none">
                <option value="">Select Location</option>
                <option>Library</option>
                <option>Cafeteria</option>
                <option>Building A</option>
                <option>Building B</option>
                <option>Sports Hall</option>
                <option>Parking Lot</option>
                <option>Main Gate</option>
                <option>Lab 3</option>
                <option>Lecture Hall 1</option>
                <option>Lecture Hall 2</option>
              </select>
            </div>
            <div>
              <label class="block text-xs text-slate-600 dark:text-slate-400 font-bold uppercase tracking-wider mb-2">Date</label>
              <input id="s-date" type="date" class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-amber-50 dark:bg-slate-900 text-slate-900 dark:text-white focus:border-brand-500 dark:focus:border-brand-dark focus:ring-4 focus:ring-brand-100 dark:focus:ring-brand-900/30 transition-all duration-200 outline-none">
            </div>
          </div>

          <div id="contact-field">
            <label class="block text-xs text-slate-600 dark:text-slate-400 font-bold uppercase tracking-wider mb-2">Your Email / Contact *</label>
            <input id="s-contact" type="text" placeholder="Example: name@sewedy.edu.eg" class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-amber-50 dark:bg-slate-900 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:border-brand-500 dark:focus:border-brand-dark focus:ring-4 focus:ring-brand-100 dark:focus:ring-brand-900/30 transition-all duration-200 outline-none">
          </div>

          <button class="w-full py-3 px-4 rounded-xl bg-gradient-to-br from-brand-500 to-cyan-600 dark:from-brand-dark dark:to-cyan-500 text-white font-head font-bold uppercase tracking-wider hover:shadow-lg dark:hover:shadow-brand-900/50 transition-all duration-200 cursor-pointer hover:-translate-y-0.5" onclick="submitReport()">Submit Report</button>
        </div>
      </div>
    </div>

    <!-- Tab Content: Browse Records -->
    <div id="tab-browse" class="hidden slide-fade tab-panel">
      <!-- Section Tabs -->
      <div class="flex gap-2 mb-6 flex-wrap">
        <button class="section-tab px-4 py-2.5 rounded-full text-sm font-head font-bold uppercase tracking-wider border border-slate-300 dark:border-slate-600 bg-white/70 dark:bg-slate-700/70 text-slate-600 dark:text-slate-300 cursor-pointer transition-all duration-200 active:bg-brand-500 active:text-white active:border-brand-500 dark:active:bg-brand-dark dark:active:border-brand-dark" onclick="setBrowseMode('lost')">Lost Items (<span id="b-lost-count">15</span>)</button>
        <button class="section-tab px-4 py-2.5 rounded-full text-sm font-head font-bold uppercase tracking-wider border border-slate-300 dark:border-slate-600 bg-white/70 dark:bg-slate-700/70 text-slate-600 dark:text-slate-300 cursor-pointer transition-all duration-200 active:bg-brand-500 active:text-white active:border-brand-500 dark:active:bg-brand-dark dark:active:border-brand-dark" onclick="setBrowseMode('found')">Found Items (<span id="b-found-count">20</span>)</button>
      </div>

      <!-- Category Filters -->
      <div class="filter-bar flex flex-wrap gap-2 mb-6">
        <button class="filter-chip px-4 py-2 rounded-full text-sm border border-slate-300 dark:border-slate-600 bg-white/70 dark:bg-slate-700/70 text-slate-600 dark:text-slate-300 cursor-pointer transition-all duration-200 hover:border-brand-500 dark:hover:border-brand-dark hover:text-slate-900 dark:hover:text-white active:bg-slate-900 active:text-white active:border-slate-900 dark:active:bg-slate-100 dark:active:text-slate-900" onclick="setFilter('')">All</button>
        <button class="filter-chip px-4 py-2 rounded-full text-sm border border-slate-300 dark:border-slate-600 bg-white/70 dark:bg-slate-700/70 text-slate-600 dark:text-slate-300 cursor-pointer transition-all duration-200 hover:border-brand-500 dark:hover:border-brand-dark hover:text-slate-900 dark:hover:text-white active:bg-slate-900 active:text-white active:border-slate-900 dark:active:bg-slate-100 dark:active:text-slate-900" onclick="setFilter('ID Card')">ID Card</button>
        <button class="filter-chip px-4 py-2 rounded-full text-sm border border-slate-300 dark:border-slate-600 bg-white/70 dark:bg-slate-700/70 text-slate-600 dark:text-slate-300 cursor-pointer transition-all duration-200 hover:border-brand-500 dark:hover:border-brand-dark hover:text-slate-900 dark:hover:text-white active:bg-slate-900 active:text-white active:border-slate-900 dark:active:bg-slate-100 dark:active:text-slate-900" onclick="setFilter('Charger')">Charger</button>
        <button class="filter-chip px-4 py-2 rounded-full text-sm border border-slate-300 dark:border-slate-600 bg-white/70 dark:bg-slate-700/70 text-slate-600 dark:text-slate-300 cursor-pointer transition-all duration-200 hover:border-brand-500 dark:hover:border-brand-dark hover:text-slate-900 dark:hover:text-white active:bg-slate-900 active:text-white active:border-slate-900 dark:active:bg-slate-100 dark:active:text-slate-900" onclick="setFilter('Bottle')">Bottle</button>
        <button class="filter-chip px-4 py-2 rounded-full text-sm border border-slate-300 dark:border-slate-600 bg-white/70 dark:bg-slate-700/70 text-slate-600 dark:text-slate-300 cursor-pointer transition-all duration-200 hover:border-brand-500 dark:hover:border-brand-dark hover:text-slate-900 dark:hover:text-white active:bg-slate-900 active:text-white active:border-slate-900 dark:active:bg-slate-100 dark:active:text-slate-900" onclick="setFilter('Notebook')">Notebook</button>
        <button class="filter-chip px-4 py-2 rounded-full text-sm border border-slate-300 dark:border-slate-600 bg-white/70 dark:bg-slate-700/70 text-slate-600 dark:text-slate-300 cursor-pointer transition-all duration-200 hover:border-brand-500 dark:hover:border-brand-dark hover:text-slate-900 dark:hover:text-white active:bg-slate-900 active:text-white active:border-slate-900 dark:active:bg-slate-100 dark:active:text-slate-900" onclick="setFilter('Headphones')">Headphones</button>
        <button class="filter-chip px-4 py-2 rounded-full text-sm border border-slate-300 dark:border-slate-600 bg-white/70 dark:bg-slate-700/70 text-slate-600 dark:text-slate-300 cursor-pointer transition-all duration-200 hover:border-brand-500 dark:hover:border-brand-dark hover:text-slate-900 dark:hover:text-white active:bg-slate-900 active:text-white active:border-slate-900 dark:active:bg-slate-100 dark:active:text-slate-900" onclick="setFilter('Keys')">Keys</button>
      </div>

      <!-- Reports List -->
      <div class="reports-grid flex flex-col gap-2" id="reports-list"></div>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast fixed right-5 bottom-5 z-50 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white/95 dark:bg-slate-800/95 shadow-lg p-4 flex items-center gap-3 transform translate-y-24 opacity-0 transition-all duration-300 pointer-events-none" id="toast">
  <span class="toast-icon text-xs font-bold rounded-lg px-2 py-1 uppercase bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400">OK</span>
  <span id="toast-msg" class="text-sm text-slate-900 dark:text-slate-100"></span>
</div>

<script>
  // ═══════════════════════════════════════════════════════════════════════════════
  // THEME MANAGEMENT
  // ═══════════════════════════════════════════════════════════════════════════════

  function initTheme() {
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme');
    const isDark = savedTheme === 'dark';

    if (isDark) {
      html.classList.add('dark');
      document.getElementById('theme-icon').textContent = '🌙';
    } else {
      html.classList.remove('dark');
      document.getElementById('theme-icon').textContent = '☀️';
    }
  }

  document.getElementById('theme-toggle').addEventListener('click', () => {
    const html = document.documentElement;
    const isDark = html.classList.toggle('dark');
    document.getElementById('theme-icon').textContent = isDark ? '🌙' : '☀️';
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  });

  // Initialize theme on page load
  initTheme();

  // ═══════════════════════════════════════════════════════════════════════════════
  // API & STATE
  // ═══════════════════════════════════════════════════════════════════════════════

  const API = `${window.location.origin}/api`;
  let currentMode = 'lost';
  let currentSMode = 'lost';
  let browseMode = 'lost';
  let filterCat = '';
  let allReports = { lost: [], found: [] };

  const ICONS = {
    'ID Card': 'ID',
    'Charger': 'CH',
    'Bottle': 'BT',
    'Notebook': 'NB',
    'Headphones': 'HP',
    'Keys': 'KY'
  };

  // Initialize dates
  document.getElementById('m-date').value = '2024-01-17';
  document.getElementById('s-date').value = new Date().toISOString().split('T')[0];

  // Load initial data
  fetch(`${API}/stats`)
    .then(r => r.json())
    .then(d => {
      document.getElementById('stat-lost').textContent = d.total_lost;
      document.getElementById('stat-found').textContent = d.total_found;
      document.getElementById('b-lost-count').textContent = d.total_lost;
      document.getElementById('b-found-count').textContent = d.total_found;
    })
    .catch(() => {});

  fetch(`${API}/reports`)
    .then(r => r.json())
    .then(d => {
      allReports = d;
      renderReports();
    })
    .catch(() => {});

  // ═══════════════════════════════════════════════════════════════════════════════
  // SCROLL REVEAL ANIMATIONS
  // ═══════════════════════════════════════════════════════════════════════════════

  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add('revealed');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.14 });

  function bindRevealAnimations(scope = document) {
    scope.querySelectorAll('.reveal-on-scroll').forEach((el, index) => {
      el.style.transitionDelay = `${Math.min(index * 45, 220)}ms`;
      revealObserver.observe(el);
    });
  }

  // ═══════════════════════════════════════════════════════════════════════════════
  // TAB MANAGEMENT
  // ═══════════════════════════════════════════════════════════════════════════════

  function switchTab(tab) {
    ['match', 'submit', 'browse'].forEach(t => {
      const panel = document.getElementById(`tab-${t}`);
      const isActive = t === tab;
      panel.classList.toggle('hidden', !isActive);
      panel.classList.toggle('is-active', isActive);
      if (isActive) {
        panel.style.display = t === 'match' ? 'grid' : 'block';
      }
    });
    document.querySelectorAll('.tab').forEach((b, i) => {
      b.classList.toggle('!bg-slate-900 dark:!bg-slate-100 !text-white dark:!text-slate-900 !shadow-md', ['match', 'submit', 'browse'][i] === tab);
    });
    if (tab === 'browse') renderReports();
  }

  // ═══════════════════════════════════════════════════════════════════════════════
  // MODE MANAGEMENT
  // ═══════════════════════════════════════════════════════════════════════════════

  function setMode(m) {
    currentMode = m;
    document.getElementById('mode-lost').classList.toggle('!bg-accent-red !text-white', m === 'lost');
    document.getElementById('mode-found').classList.toggle('!bg-brand-500 dark:!bg-brand-dark !text-white', m === 'found');
  }

  function setSMode(m) {
    currentSMode = m;
    document.getElementById('smode-lost').classList.toggle('!bg-accent-red !text-white', m === 'lost');
    document.getElementById('smode-found').classList.toggle('!bg-brand-500 dark:!bg-brand-dark !text-white', m === 'found');
    document.getElementById('contact-field').style.display = m === 'lost' ? 'block' : 'none';
  }

  // ═══════════════════════════════════════════════════════════════════════════════
  // BROWSE MODE
  // ═══════════════════════════════════════════════════════════════════════════════

  function setBrowseMode(m) {
    browseMode = m;
    document.querySelectorAll('.section-tab').forEach((t, i) => {
      t.classList.toggle('!bg-brand-500 dark:!bg-brand-dark !text-white !border-brand-500 dark:!border-brand-dark', ['lost', 'found'][i] === m);
    });
    renderReports();
  }

  function setFilter(cat) {
    filterCat = cat;
    document.querySelectorAll('.filter-chip').forEach(c => {
      const isActive = (c.textContent.includes(cat || 'All') && (!cat || c.textContent.includes(cat)));
      c.classList.toggle('!bg-slate-900 dark:!bg-slate-100 !text-white dark:!text-slate-900 !border-slate-900 dark:!border-slate-100', isActive);
    });
    renderReports();
  }

  function renderReports() {
    const pool = allReports[browseMode] || [];
    const filtered = filterCat ? pool.filter(r => r.category === filterCat) : pool;
    const container = document.getElementById('reports-list');

    if (!filtered.length) {
      container.innerHTML = `
        <div class="rounded-3xl border border-dashed border-slate-300 dark:border-slate-600 bg-white/50 dark:bg-slate-800/50 min-h-72 flex flex-col items-center justify-center text-center px-6 py-12">
          <div class="w-16 h-16 rounded-full bg-gradient-to-br from-slate-200 dark:from-slate-700 to-slate-200 dark:to-slate-700 border border-slate-300 dark:border-slate-600 flex items-center justify-center font-head text-sm font-bold uppercase text-slate-600 dark:text-slate-400 mb-4">None</div>
          <div class="font-head font-bold text-2xl text-slate-900 dark:text-white mb-3">No Reports</div>
          <div class="text-slate-600 dark:text-slate-400 max-w-sm">No items match this filter yet.</div>
        </div>
      `;
      return;
    }

    container.innerHTML = filtered.map(r => `
      <div class="reveal-on-scroll border border-slate-300 dark:border-slate-600 rounded-2xl bg-white/70 dark:bg-slate-800/70 shadow-sm hover:shadow-md hover:-translate-y-1 transition-all duration-200 p-3 sm:p-4 flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center font-head text-xs font-bold ${browseMode === 'lost' ? 'bg-accent-red/20 dark:bg-accent-red/10 border border-accent-red/30 dark:border-accent-red/20 text-accent-red dark:text-accent-red' : 'bg-brand-500/20 dark:bg-brand-500/10 border border-brand-500/30 dark:border-brand-500/20 text-brand-600 dark:text-brand-400'} flex-shrink-0">
          ${ICONS[r.category] || 'IT'}
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-semibold text-slate-900 dark:text-white truncate">${r.description}</div>
          <div class="text-xs text-slate-600 dark:text-slate-400 mt-1">${r.category} · ${r.color || '?'} · ${r.date}</div>
        </div>
        <div class="text-xs text-slate-600 dark:text-slate-400 whitespace-nowrap">Location: ${r.location}</div>
      </div>
    `).join('');

    bindRevealAnimations(container);
  }

  // ═══════════════════════════════════════════════════════════════════════════════
  // MATCHING ENGINE
  // ═════════════════════════════════════════════════════════════════════════════════

  async function runMatch() {
    const desc = document.getElementById('m-desc').value.trim();
    if (!desc) {
      showToast('Please describe the item', 'WARN');
      return;
    }

    const panel = document.getElementById('results-panel');
    panel.innerHTML = `
      <div class="rounded-3xl border border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 min-h-72 flex items-center justify-center gap-3 text-slate-600 dark:text-slate-400">
        <div class="w-5 h-5 rounded-full border-2 border-slate-300 dark:border-slate-600 border-t-brand-500 dark:border-t-brand-400 animate-spin"></div>
        <span class="text-sm">Finding likely matches...</span>
      </div>
    `;

    const body = {
      description: desc,
      category: document.getElementById('m-cat').value,
      color: document.getElementById('m-color').value,
      location: document.getElementById('m-loc').value,
      date: document.getElementById('m-date').value || '2024-01-17',
      mode: currentMode
    };

    try {
      const res = await fetch(`${API}/match`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      const predBox = document.getElementById('cat-prediction');
      predBox.classList.remove('hidden');
      document.getElementById('pred-label').textContent = `${data.predicted_category}`;
      document.getElementById('pred-conf').textContent = `${Math.round(data.category_confidence * 100)}% confidence`;
      document.getElementById('pred-bar').style.width = `${Math.round(data.category_confidence * 100)}%`;

      renderMatches(data.matches, currentMode);
    } catch (e) {
      panel.innerHTML = `
        <div class="rounded-3xl border border-dashed border-slate-300 dark:border-slate-600 bg-white/50 dark:bg-slate-800/50 min-h-72 flex flex-col items-center justify-center text-center px-6 py-12">
          <div class="w-16 h-16 rounded-full bg-gradient-to-br from-red-200 dark:from-red-900/30 to-red-200 dark:to-red-900/30 border border-red-300 dark:border-red-700 flex items-center justify-center font-head text-sm font-bold uppercase text-red-600 dark:text-red-400 mb-4">Error</div>
          <div class="font-head font-bold text-2xl text-slate-900 dark:text-white mb-3">Server Unreachable</div>
          <div class="text-slate-600 dark:text-slate-400 max-w-sm">Could not connect to backend service.</div>
        </div>
      `;
    }
  }

  function renderMatches(matches, mode) {
    const panel = document.getElementById('results-panel');
    if (!matches.length) {
      panel.innerHTML = `
        <div class="rounded-3xl border border-dashed border-slate-300 dark:border-slate-600 bg-white/50 dark:bg-slate-800/50 min-h-72 flex flex-col items-center justify-center text-center px-6 py-12">
          <div class="w-16 h-16 rounded-full bg-gradient-to-br from-amber-200 dark:from-amber-900/30 to-amber-200 dark:to-amber-900/30 border border-amber-300 dark:border-amber-700 flex items-center justify-center font-head text-sm font-bold uppercase text-amber-600 dark:text-amber-400 mb-4">None</div>
          <div class="font-head font-bold text-2xl text-slate-900 dark:text-white mb-3">No Matches Found</div>
          <div class="text-slate-600 dark:text-slate-400 max-w-sm">Try broadening your description or changing filters.</div>
        </div>
      `;
      return;
    }

    const label = mode === 'lost' ? 'Found Report' : 'Lost Report';
    panel.innerHTML = `
      <div class="space-y-4">
        <div class="flex items-end justify-between gap-3 mb-2">
          <div class="font-head font-bold text-3xl text-slate-900 dark:text-white">Top Matches</div>
          <div class="text-xs text-slate-600 dark:text-slate-400 uppercase tracking-wider">${matches.length} results sorted by confidence</div>
        </div>
        ${matches.map((m, i) => {
          const pct = Math.round(m.score * 100);
          const color = pct >= 60 ? '#2f9e44' : pct >= 35 ? '#b8870b' : '#c24132';
          return `
          <div class="reveal-on-scroll border border-slate-300 dark:border-slate-600 rounded-2xl bg-white/70 dark:bg-slate-800/70 shadow-sm hover:shadow-md transition-all duration-200 p-4 sm:p-5 cursor-pointer ${i === 0 && pct > 40 ? 'ring-2 ring-brand-500 dark:ring-brand-400' : ''}" style="animation-delay:${i * 65}ms" onclick="toggleMatchReasons(this)">
            <div class="flex justify-between gap-4 items-start mb-3">
              <div class="flex-1">
                <div class="text-xs text-slate-600 dark:text-slate-400 uppercase tracking-wider mb-2">${label} · ${m.id}</div>
                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-amber-300 dark:border-amber-700/50 bg-amber-50 dark:bg-amber-950/30 text-amber-800 dark:text-amber-300 text-xs font-bold mb-3">
                  <span class="w-5 h-5 rounded-full bg-amber-200 dark:bg-amber-800 text-amber-900 dark:text-amber-100 flex items-center justify-center text-xs font-bold">${ICONS[m.category] || 'IT'}</span>
                  ${m.category}
                </div>
                <div class="text-sm text-slate-900 dark:text-white leading-relaxed">${m.description}</div>
              </div>
              <div class="flex-shrink-0 w-16 h-16 rounded-full flex items-center justify-center font-head font-bold text-lg" style="background-color:${color}21;border: 2px solid ${color};color:${color};">${pct}%</div>
            </div>
            <div class="flex flex-wrap gap-2 text-xs">
              <span class="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700/50 text-slate-700 dark:text-slate-300">Location: ${m.location}</span>
              <span class="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700/50 text-slate-700 dark:text-slate-300">Color: ${m.color || '?'}</span>
              <span class="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700/50 text-slate-700 dark:text-slate-300">Date: ${m.date}</span>
              ${m.finder ? `<span class="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700/50 text-slate-700 dark:text-slate-300">Finder: ${m.finder.replace(/_/g, ' ')}</span>` : ''}
              ${m.contact ? `<span class="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700/50 text-slate-700 dark:text-slate-300">Contact: ${m.contact}</span>` : ''}
            </div>
            <div class="reasons-list max-h-0 opacity-0 overflow-hidden transition-all duration-300 mt-3 pt-3 border-t border-slate-300 dark:border-slate-600 ${i === 0 ? 'is-open max-h-96 opacity-100' : ''}">
              <h4 class="text-xs text-slate-600 dark:text-slate-400 font-bold uppercase tracking-wider mb-2">Why Matched</h4>
              <div class="flex flex-wrap gap-2">
                ${m.reasons.map(r => `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg border border-green-300/50 dark:border-green-700/50 bg-green-50 dark:bg-green-950/30 text-green-700 dark:text-green-400 text-xs font-semibold">+ ${r}</span>`).join('')}
              </div>
            </div>
          </div>
        `}).join('')}
      </div>
    `;

    bindRevealAnimations(panel);
  }

  function toggleMatchReasons(card) {
    const reasons = card.querySelector('.reasons-list');
    if (!reasons) return;
    reasons.classList.toggle('is-open');
    reasons.classList.toggle('max-h-96');
    reasons.classList.toggle('opacity-100');
  }

  // ═══════════════════════════════════════════════════════════════════════════════
  // SUBMIT REPORT
  // ═════════════════════════════════════════════════════════════════════════════════

  async function submitReport() {
    const desc = document.getElementById('s-desc').value.trim();
    if (!desc) {
      showToast('Please describe the item', 'WARN');
      return;
    }

    const body = {
      type: currentSMode,
      description: desc,
      category: document.getElementById('s-cat').value,
      color: document.getElementById('s-color').value,
      location: document.getElementById('s-loc').value,
      date: document.getElementById('s-date').value,
      contact: document.getElementById('s-contact').value,
    };

    try {
      const res = await fetch(`${API}/submit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await res.json();
      if (data.success) {
        showToast(`Report ${data.report.id} submitted. Auto-detected category: ${data.predicted_category} (${Math.round(data.confidence * 100)}%)`, 'OK');
        document.getElementById('s-desc').value = '';
        document.getElementById('s-color').value = '';

        fetch(`${API}/stats`)
          .then(r => r.json())
          .then(d => {
            document.getElementById('stat-lost').textContent = d.total_lost;
            document.getElementById('stat-found').textContent = d.total_found;
            document.getElementById('b-lost-count').textContent = d.total_lost;
            document.getElementById('b-found-count').textContent = d.total_found;
          });

        fetch(`${API}/reports`)
          .then(r => r.json())
          .then(d => { allReports = d; });
      }
    } catch (e) {
      showToast('Could not submit report. Server offline.', 'WARN');
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════════
  // TOAST NOTIFICATIONS
  // ═════════════════════════════════════════════════════════════════════════════════

  function showToast(msg, icon = 'OK') {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    document.getElementById('toast-icon').textContent = icon;

    if (icon === 'OK') {
      t.classList.add('bg-green-50', 'dark:bg-green-950/30', 'border-green-200', 'dark:border-green-800');
      t.classList.remove('bg-red-50', 'dark:bg-red-950/30', 'border-red-200', 'dark:border-red-800');
      document.querySelector('.toast-icon').classList.add('bg-green-100', 'dark:bg-green-900/30', 'text-green-700', 'dark:text-green-400');
      document.querySelector('.toast-icon').classList.remove('bg-red-100', 'dark:bg-red-900/30', 'text-red-700', 'dark:text-red-400');
    } else {
      t.classList.add('bg-red-50', 'dark:bg-red-950/30', 'border-red-200', 'dark:border-red-800');
      t.classList.remove('bg-green-50', 'dark:bg-green-950/30', 'border-green-200', 'dark:border-green-800');
      document.querySelector('.toast-icon').classList.add('bg-red-100', 'dark:bg-red-900/30', 'text-red-700', 'dark:text-red-400');
      document.querySelector('.toast-icon').classList.remove('bg-green-100', 'dark:bg-green-900/30', 'text-green-700', 'dark:text-green-400');
    }

    t.classList.add('translate-y-0', 'opacity-100', 'pointer-events-auto');
    t.classList.remove('translate-y-24', 'opacity-0', 'pointer-events-none');

    setTimeout(() => {
      t.classList.remove('translate-y-0', 'opacity-100', 'pointer-events-auto');
      t.classList.add('translate-y-24', 'opacity-0', 'pointer-events-none');
    }, 4000);
  }
</script>
</body>
</html>
